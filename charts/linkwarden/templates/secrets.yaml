{{- /*
  This chart intentionally does NOT create any Secret resources from plain text values.
  For security reasons all credentials must be provided through existing Kubernetes Secrets:
    - NextAuth secret:   .Values.linkwarden.nextAuthSecret.existingSecret.name (key: 'token' by default)
    - Database:          .Values.linkwarden.database.existingSecret (keys: username, password)
    - S3 storage:        .Values.linkwarden.data.s3.existingSecret (keys: accessKey, secretKey)
    - SSO providers:     .Values.linkwarden.auth.sso[].existingSecret (keys: clientId, clientSecret[, apiKey|tenantId])
*/}}
